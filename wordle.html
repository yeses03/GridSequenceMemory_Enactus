<!--
  Enactus VIT Chennai - Word Grid (Wordle)
  Single self-contained file (shares the images/ folder with the memory game).
  No build tools, no server, no external network needed - just open in a browser.

  Same UI/theme as the Memory Grid: Enactus black/gold palette, geometric type,
  the drifting arrow background, and the identical header lock-up.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Enactus VIT Chennai - Word Grid</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#141414;        /* near-black, the Enactus field colour */
    --gold:#FFC222;       /* primary accent */
    --gold-dark:#E0A400;  /* solid secondary gold */
    --gray:#515356;       /* body text */
    --gray-2:#8B8E91;     /* muted text */
    --bg:#F5F4F0;         /* flat light background */
    --card:#FFFFFF;
    --line:#E4E3DC;       /* hairline borders */
    --line-strong:#D2D1C8;
    --correct:#46A758;    /* right letter, right spot (green) */
    --present:var(--gold);/* right letter, wrong spot (brand gold) */
    --absent:#787C7E;     /* letter not in word */
    --radius:14px;
    --radius-sm:11px;
    --font:"Montserrat","Avenir Next","Avenir","Segoe UI",system-ui,-apple-system,sans-serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--gray);
    display:flex;
    flex-direction:column;
    min-height:100%;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
  }

  /* ── Background arrow motif (subtle drift) ───────────── */
  .bg{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .bg-arrow{ position:absolute; line-height:0; will-change:transform; animation:drift ease-in-out infinite alternate; }
  .bg-arrow svg{ display:block; width:100%; height:100%; }
  @keyframes drift{
    from{ transform:translateY(0) rotate(var(--r,0deg)); }
    to  { transform:translateY(-22px) rotate(var(--r,0deg)); }
  }

  header,main,footer{ position:relative; z-index:1; }

  /* ── Header (identical lock-up to the memory game) ───── */
  header{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px;
    padding:14px clamp(16px,4vw,32px);
    background:var(--ink);
    flex:0 0 auto;
  }
  .brand{ display:flex; align-items:center; gap:16px; min-width:0; }
  .brand-mark{ height:52px; flex:0 0 auto; display:flex; align-items:center; }
  .brand-mark svg,.brand-mark img{ height:100%; width:auto; display:block; }
  .brand-mark img{ transform:translateY(-12.5%); }
  .brand-div{ width:1px; height:30px; background:rgba(255,255,255,.16); flex:0 0 auto; transform:translateY(11px); }
  .game-label{ font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); white-space:nowrap; transform:translateY(11px); }

  .icon-btn{
    width:44px; height:44px; border-radius:var(--radius-sm); flex:0 0 auto;
    border:1.5px solid rgba(255,255,255,.22);
    background:transparent; color:#fff; cursor:pointer;
    display:grid; place-items:center; transition:transform .12s ease, background .15s, border-color .15s;
  }
  .icon-btn:hover{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.4); }
  .icon-btn:active{ transform:scale(.9); }
  .icon-btn svg{ width:22px; height:22px; }
  .icon-btn .off{ display:none; }
  .icon-btn.muted .on{ display:none; }
  .icon-btn.muted .off{ display:block; color:#9A9B9D; }

  @media (max-width:560px){
    .brand-div,.game-label{ display:none; }
  }

  /* ── Stage ──────────────────────────────────────────── */
  main{
    flex:1 1 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:8px clamp(12px,4vw,24px) clamp(12px,3vh,24px);
  }
  .stage{ position:relative; width:min(94vw, 460px); display:flex; flex-direction:column; align-items:center; }

  .statusbar{ height:34px; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
  .hint{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 15px; border-radius:999px;
    background:var(--card); border:1.5px solid var(--line);
    font-weight:600; font-size:13px; color:var(--gray);
  }
  .hint b{ color:var(--ink); font-weight:800; }

  /* ── Board ──────────────────────────────────────────── */
  .board{ display:grid; grid-template-rows:repeat(6,1fr); gap:clamp(5px,1.4vw,7px); width:min(80vw, 300px, 42vh); }
  .row{ display:grid; grid-template-columns:repeat(5,1fr); gap:clamp(5px,1.4vw,7px); }
  .cell{
    position:relative; aspect-ratio:1/1;
    display:grid; place-items:center;
    border:2px solid var(--line-strong);
    border-radius:9px;
    background:var(--card);
    font-weight:800; font-size:clamp(20px,6.4vw,30px); text-transform:uppercase;
    color:var(--ink);
    transition:transform .1s ease, border-color .12s ease;
  }
  .cell.filled{ border-color:var(--gray-2); animation:pop .12s ease; }
  @keyframes pop{ 0%{transform:scale(.9)} 100%{transform:scale(1)} }

  .cell.flip{ animation:flip .5s ease; }
  @keyframes flip{ 0%{transform:rotateX(0)} 50%{transform:rotateX(90deg)} 100%{transform:rotateX(0)} }

  .cell.correct{ background:var(--correct); border-color:var(--correct); color:#fff; }
  .cell.present{ background:var(--present); border-color:var(--gold-dark); color:var(--ink); }
  .cell.absent{ background:var(--absent); border-color:var(--absent); color:#fff; }

  .row.shake{ animation:shake .42s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake{
    10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)}
  }
  .cell.win{ animation:bounce .5s ease; }
  @keyframes bounce{ 0%,100%{transform:translateY(0)} 40%{transform:translateY(-16px)} 70%{transform:translateY(-4px)} }

  /* ── Keyboard ───────────────────────────────────────── */
  .keyboard{ margin-top:clamp(12px,3vh,20px); width:100%; display:flex; flex-direction:column; gap:7px; }
  .krow{ display:flex; justify-content:center; gap:6px; }
  .key{
    appearance:none; cursor:pointer; font-family:inherit;
    flex:1 1 auto; min-width:0; height:clamp(46px,7.4vh,56px);
    border-radius:8px; border:1.5px solid var(--line);
    background:var(--card); color:var(--ink);
    font-weight:700; font-size:14px; text-transform:uppercase;
    display:grid; place-items:center;
    transition:transform .08s ease, background .15s, color .15s, border-color .15s;
  }
  .key:active{ transform:scale(.92); }
  .key.wide{ flex:1.5 1 auto; font-size:11px; letter-spacing:.5px; }
  .key .kw{ width:22px; height:22px; }
  .key.correct{ background:var(--correct); border-color:var(--correct); color:#fff; }
  .key.present{ background:var(--present); border-color:var(--gold-dark); color:var(--ink); }
  .key.absent{ background:var(--absent); border-color:var(--absent); color:#fff; }

  /* ── Overlay screens (solid, no blur) ───────────────── */
  .screen{
    position:absolute; inset:-14px; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:26px;
    background:var(--bg);
    border-radius:calc(var(--radius) + 4px);
  }
  .screen[hidden]{ display:none; }
  .screen h1{ margin:0 0 8px; font-size:clamp(28px,6.5vw,42px); font-weight:800; color:var(--ink); letter-spacing:-.5px; }
  .screen p{ margin:0 0 24px; font-size:15px; color:var(--gray-2); font-weight:500; max-width:340px; line-height:1.55; }
  .screen .legend{ display:flex; flex-direction:column; gap:9px; margin:0 0 26px; }
  .legend-row{ display:flex; align-items:center; gap:11px; font-size:13.5px; font-weight:600; color:var(--gray); }
  .legend-tile{ width:30px; height:30px; border-radius:7px; flex:0 0 auto; display:grid; place-items:center; font-weight:800; color:#fff; font-size:15px; }
  .legend-tile.correct{ background:var(--correct); }
  .legend-tile.present{ background:var(--present); color:var(--ink); }
  .legend-tile.absent{ background:var(--absent); }

  .btn{
    appearance:none; cursor:pointer; font-family:inherit; font-weight:800; letter-spacing:.3px;
    background:var(--gold); color:var(--ink);
    border:2px solid var(--gold-dark);
    padding:16px 42px; border-radius:var(--radius-sm); font-size:18px;
    transition:transform .12s ease, background .15s;
  }
  .btn:hover{ background:var(--gold-dark); }
  .btn:active{ transform:scale(.96); }
  .btn.pulse{ animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.045)} }

  .answer-line{ margin:2px 0 24px; font-size:14px; font-weight:600; color:var(--gray-2); letter-spacing:.3px; }
  .answer-line b{ color:var(--ink); font-weight:800; letter-spacing:2px; }
  .best-line{ margin-top:18px; font-size:13px; font-weight:600; color:var(--gray-2); }

  /* ── Toast ──────────────────────────────────────────── */
  .toast{ position:absolute; top:-6px; left:50%; transform:translateX(-50%); z-index:30; pointer-events:none; }
  .toast[hidden]{ display:none; }
  .toast .bubble{
    background:var(--ink); color:#fff;
    padding:12px 22px; border-radius:10px;
    font-size:15px; font-weight:700; white-space:nowrap;
    animation:pop .2s ease;
  }

  footer{ flex:0 0 auto; text-align:center; padding:10px; font-size:12px; color:var(--gray-2); font-weight:500; }
  footer b{ color:var(--gray); font-weight:700; }
</style>

<div class="bg" id="bg" aria-hidden="true"></div>

<header>
  <div class="brand">
    <span class="brand-mark" id="brandMark" aria-label="Enactus VIT Chennai"></span>
    <span class="brand-div"></span>
    <span class="game-label">Word Grid</span>
  </div>
  <button id="muteBtn" class="icon-btn" aria-label="Toggle sound" title="Sound on / off">
    <svg class="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 8a5 5 0 0 1 0 8"/><path d="M17.7 5a9 9 0 0 1 0 14"/><path d="M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5a.8.8 0 0 1 1.5.5v14a.8.8 0 0 1-1.5.5z"/></svg>
    <svg class="off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5a.8.8 0 0 1 1.5.5v14a.8.8 0 0 1-1.5.5z"/><path d="M16 10l4 4M20 10l-4 4"/></svg>
  </button>
</header>

<main>
  <div class="stage">
    <div class="statusbar">
      <div id="hint" class="hint" hidden></div>
    </div>

    <div id="board" class="board" aria-label="Word grid"></div>
    <div id="keyboard" class="keyboard" aria-label="Keyboard"></div>

    <div id="startScreen" class="screen">
      <h1>Word Grid</h1>
      <p>Guess the 5-letter word in 6 tries. Every guess colours the tiles:</p>
      <div class="legend">
        <div class="legend-row"><span class="legend-tile correct">A</span> Right letter, right spot</div>
        <div class="legend-row"><span class="legend-tile present">B</span> Right letter, wrong spot</div>
        <div class="legend-row"><span class="legend-tile absent">C</span> Letter not in the word</div>
      </div>
      <button id="startBtn" class="btn pulse">Start game</button>
      <div class="best-line" id="startBest" hidden></div>
    </div>

    <div id="overScreen" class="screen" hidden>
      <h1 id="overTitle">Nice!</h1>
      <div class="answer-line">The word was <b id="answerWord">-----</b></div>
      <button id="againBtn" class="btn">Play again</button>
      <div class="best-line" id="overBest" hidden></div>
    </div>

    <div id="toast" class="toast" hidden><div class="bubble" id="toastBubble"></div></div>
  </div>
</main>

<footer>Guess the 5-letter word · <b>Enactus VIT Chennai</b></footer>

<script>
"use strict";

/* ============================================================================
   CONFIG  (shares the images/ folder with the memory game)
   ========================================================================== */
const CONFIG = {
  imageDir: "images/",
  logoFile: "logo-full.png",   // full Enactus VIT Chennai lockup in the header
};

/* Answer pool: common, recognisable 5-letter words, many on-brand
   (sustainability / entrepreneurship / community) - easy enough for a moving
   crowd, but still a real Wordle. */
const WORDS = [
  "GREEN","EARTH","PLANT","WATER","SOLAR","POWER","MONEY","SHARE","TRUST","REACH",
  "SCALE","BUILD","DREAM","LEARN","TEACH","SKILL","UNITE","SERVE","YOUTH","GOALS",
  "LIGHT","SMART","VALUE","GRANT","VOICE","PEACE","HAPPY","SMILE","HEART","HANDS",
  "WORLD","LOCAL","RURAL","WOMEN","CLEAN","FRESH","SEEDS","CRAFT","TRADE","PRICE",
  "STORE","MAKER","IDEAS","THINK","TEAMS","EVENT","STAGE","PITCH","BRAND","STORY",
  "FOCUS","DRIVE","SPARK","RAISE","BLOOM","RIVER","OCEAN","FIELD","HONEY","MANGO",
  "BREAD","SUGAR","SPICE","LEADS",
];

const ROWS = 6, COLS = 5;

/* ============================================================================
   ENACTUS ARROW MARK  (fallback if the logo image is missing)
   ========================================================================== */
const ARROW_MARK = `
  <svg viewBox="0 0 100 100" aria-hidden="true">
    <polygon points="36,2 98,65 36,98"   fill="#FFC222"/>
    <polygon points="36,52 2,65 36,98"   fill="#FFC222"/>
    <polygon points="36,52 36,98 44,73"  fill="#E0A400"/>
    <polygon points="65,44 70.5,65 67.5,53" fill="#E0A400"/>
  </svg>`;
const ARROW_SOLID = `<svg viewBox="0 0 100 100" aria-hidden="true"><path d="M36 2 L98 65 L36 98 L2 65 L36 52 Z" fill="currentColor"/></svg>`;

/* ============================================================================
   AUDIO  (Web Audio API, tones generated on the fly - no files)
   ========================================================================== */
let actx = null;
let muted = localStorage.getItem("ewg_muted") === "1";
function initAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ actx = null; }
  }
  if(actx && actx.state === "suspended") actx.resume();
}
function tone(freq, dur, type="sine", vol=0.2, when=0){
  if(muted || !actx) return;
  const t = actx.currentTime + when;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
const sndKey   = ()=> tone(330, 0.05, "sine", 0.12);
const sndBack  = ()=> tone(220, 0.05, "sine", 0.12);
const sndFlip  = (i)=> tone(440 + i*40, 0.10, "sine", 0.16, i*0.02);
const sndBad   = ()=>{ tone(150, 0.35, "sawtooth", 0.16); tone(110, 0.35, "sine", 0.14); };
const sndWin   = ()=>{ tone(523.25,0.14,"sine",0.2); tone(659.25,0.14,"sine",0.2,0.12); tone(783.99,0.14,"sine",0.2,0.24); tone(1046.5,0.34,"sine",0.22,0.36); };
const sndStart = ()=>{ tone(523.25, 0.14, "sine", 0.2); tone(783.99, 0.22, "sine", 0.2, 0.1); };

/* ============================================================================
   ELEMENTS
   ========================================================================== */
const bgEl        = document.getElementById("bg");
const brandMark   = document.getElementById("brandMark");
const boardEl     = document.getElementById("board");
const keyboardEl  = document.getElementById("keyboard");
const muteBtn     = document.getElementById("muteBtn");
const hintEl      = document.getElementById("hint");
const startScreen = document.getElementById("startScreen");
const overScreen  = document.getElementById("overScreen");
const startBtn    = document.getElementById("startBtn");
const againBtn    = document.getElementById("againBtn");
const overTitle   = document.getElementById("overTitle");
const answerWord  = document.getElementById("answerWord");
const toast       = document.getElementById("toast");
const toastBubble = document.getElementById("toastBubble");
const startBest   = document.getElementById("startBest");
const overBest    = document.getElementById("overBest");

/* ============================================================================
   STATE
   ========================================================================== */
let answer = "";
let rowIdx = 0;
let curGuess = "";
let phase = "start";          // start | playing | over
let locked = false;           // input frozen during reveal
const cells = [];             // cells[r][c]
const keyEls = {};            // letter -> button
const keyState = {};          // letter -> best state
let bestScore = parseInt(localStorage.getItem("ewg_best") || "0", 10);  // fewest guesses to a win

const KEYS = [
  ["Q","W","E","R","T","Y","U","I","O","P"],
  ["A","S","D","F","G","H","J","K","L"],
  ["ENTER","Z","X","C","V","B","N","M","DEL"],
];

/* ── Brand mark ─────────────────────────────────────── */
function renderBrandMark(){
  if(CONFIG.logoFile){
    const img = new Image();
    img.alt = "Enactus VIT Chennai";
    img.style.cssText = "height:100%;width:auto;object-fit:contain;display:block;";
    img.onload  = ()=>{ brandMark.innerHTML = ""; brandMark.appendChild(img); };
    img.onerror = ()=>{ brandMark.innerHTML = ARROW_MARK; };
    img.src = CONFIG.imageDir + CONFIG.logoFile;
  }else{
    brandMark.innerHTML = ARROW_MARK;
  }
}

/* ── Background drift ───────────────────────────────── */
function buildBackground(){
  const arrows = [
    [ 6,  16, 150, "var(--gray)",      .05, -18,  9,  0],
    [82,  10, 110, "var(--gold-dark)", .10,  22, 11, -2],
    [88,  62, 190, "var(--gray)",      .045, -8, 12, -5],
    [12,  70, 130, "var(--gold-dark)", .08,  14, 10, -3],
    [46,  86,  90, "var(--gray)",      .05,  30,  8, -1],
    [70,  40,  70, "var(--gray)",      .04, -26, 13, -6],
  ];
  bgEl.innerHTML = "";
  for(const [l,t,s,c,o,r,dur,del] of arrows){
    const el = document.createElement("span");
    el.className = "bg-arrow";
    el.style.cssText =
      `left:${l}%;top:${t}%;width:${s}px;height:${s}px;color:${c};opacity:${o};`+
      `--r:${r}deg;animation-duration:${dur}s;animation-delay:${del}s;`;
    el.innerHTML = ARROW_SOLID;
    bgEl.appendChild(el);
  }
}

/* ── Board + keyboard ───────────────────────────────── */
function buildBoard(){
  boardEl.innerHTML = "";
  cells.length = 0;
  for(let r=0;r<ROWS;r++){
    const row = document.createElement("div");
    row.className = "row";
    const rowCells = [];
    for(let c=0;c<COLS;c++){
      const cell = document.createElement("div");
      cell.className = "cell";
      row.appendChild(cell);
      rowCells.push(cell);
    }
    cells.push(rowCells);
    boardEl.appendChild(row);
  }
}
const BACK_ICON = `<svg class="kw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 5H8L2 12l6 7h13a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z"/><path d="M16 9l-5 6M11 9l5 6"/></svg>`;
function buildKeyboard(){
  keyboardEl.innerHTML = "";
  for(const rowKeys of KEYS){
    const krow = document.createElement("div");
    krow.className = "krow";
    for(const k of rowKeys){
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "key" + (k.length > 1 ? " wide" : "");
      if(k === "DEL"){ btn.innerHTML = BACK_ICON; btn.setAttribute("aria-label","Delete"); }
      else { btn.textContent = k; }
      btn.addEventListener("click", ()=> handleKey(k));
      if(k.length === 1) keyEls[k] = btn;
      krow.appendChild(btn);
    }
    keyboardEl.appendChild(krow);
  }
}

/* ── Toast ──────────────────────────────────────────── */
let toastTimer = null;
function showToast(msg){
  toastBubble.textContent = msg;
  toast.hidden = false;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.hidden = true, 1300);
}

/* ============================================================================
   FLOW
   ========================================================================== */
function startGame(){
  initAudio(); sndStart();
  startScreen.hidden = true; overScreen.hidden = true;
  answer = WORDS[Math.floor(Math.random() * WORDS.length)];
  rowIdx = 0; curGuess = ""; phase = "playing"; locked = false;
  buildBoard();
  // reset keyboard colours
  for(const k in keyState) delete keyState[k];
  for(const k in keyEls) keyEls[k].className = "key";
  hintEl.hidden = false;
  hintEl.innerHTML = `Guess <b>1</b> of ${ROWS}`;
}

function handleKey(k){
  if(phase !== "playing" || locked) return;
  if(k === "ENTER"){ submitGuess(); return; }
  if(k === "DEL"){ deleteLetter(); return; }
  if(/^[A-Z]$/.test(k)) addLetter(k);
}
function addLetter(ch){
  if(curGuess.length >= COLS) return;
  const cell = cells[rowIdx][curGuess.length];
  cell.textContent = ch;
  cell.classList.add("filled");
  curGuess += ch;
  sndKey();
}
function deleteLetter(){
  if(curGuess.length === 0) return;
  curGuess = curGuess.slice(0, -1);
  const cell = cells[rowIdx][curGuess.length];
  cell.textContent = "";
  cell.classList.remove("filled");
  sndBack();
}
function submitGuess(){
  if(curGuess.length < COLS){
    showToast("Not enough letters");
    sndBad();
    shakeRow();
    return;
  }
  const guess = curGuess;
  const result = scoreGuess(guess, answer);
  locked = true;
  const rowCells = cells[rowIdx];

  // staggered flip reveal
  for(let c=0;c<COLS;c++){
    setTimeout(()=>{ rowCells[c].classList.add("flip"); sndFlip(c); }, c*180);
    setTimeout(()=>{ rowCells[c].classList.add(result[c]); }, c*180 + 250);
  }

  setTimeout(()=>{
    applyKeyboard(guess, result);
    const won = result.every(s => s === "correct");
    if(won){ winRound(); }
    else if(rowIdx === ROWS - 1){ loseRound(); }
    else {
      rowIdx++; curGuess = ""; locked = false;
      hintEl.innerHTML = `Guess <b>${rowIdx + 1}</b> of ${ROWS}`;
    }
  }, (COLS - 1)*180 + 500);
}

/* Standard Wordle scoring with correct duplicate-letter handling. */
function scoreGuess(guess, target){
  const res = new Array(COLS).fill("absent");
  const counts = {};
  for(const ch of target) counts[ch] = (counts[ch] || 0) + 1;
  // first pass: exact matches
  for(let i=0;i<COLS;i++){
    if(guess[i] === target[i]){ res[i] = "correct"; counts[guess[i]]--; }
  }
  // second pass: present elsewhere
  for(let i=0;i<COLS;i++){
    if(res[i] === "correct") continue;
    const ch = guess[i];
    if(counts[ch] > 0){ res[i] = "present"; counts[ch]--; }
  }
  return res;
}
const RANK = { absent:0, present:1, correct:2 };
function applyKeyboard(guess, result){
  for(let i=0;i<COLS;i++){
    const ch = guess[i], st = result[i];
    if(!keyState[ch] || RANK[st] > RANK[keyState[ch]]){
      keyState[ch] = st;
      if(keyEls[ch]){ keyEls[ch].classList.remove("absent","present","correct"); keyEls[ch].classList.add(st); }
    }
  }
}
function shakeRow(){
  const row = boardEl.children[rowIdx];
  row.classList.remove("shake"); void row.offsetWidth; row.classList.add("shake");
}

function winRound(){
  phase = "over";
  sndWin();
  cells[rowIdx].forEach((cell, i)=> setTimeout(()=> cell.classList.add("win"), i*90));
  const guesses = rowIdx + 1;
  if(bestScore === 0 || guesses < bestScore){ bestScore = guesses; localStorage.setItem("ewg_best", String(bestScore)); }
  setTimeout(()=>{
    overTitle.textContent = winTitle(guesses);
    answerWord.textContent = answer;
    updateBestLines();
    hintEl.hidden = true;
    overScreen.hidden = false;
  }, 900);
}
function winTitle(g){
  return ["Genius!","Brilliant!","Great!","Nice!","Solid!","Phew!"][Math.min(g - 1, 5)];
}
function loseRound(){
  phase = "over";
  sndBad();
  setTimeout(()=>{
    overTitle.textContent = "So close!";
    answerWord.textContent = answer;
    updateBestLines();
    hintEl.hidden = true;
    overScreen.hidden = false;
  }, 500);
  locked = true;
}
function updateBestLines(){
  const txt = bestScore > 0 ? ("Best solve: " + bestScore + (bestScore === 1 ? " guess" : " guesses")) : "";
  startBest.hidden = bestScore === 0; overBest.hidden = bestScore === 0;
  startBest.textContent = txt; overBest.textContent = txt;
}

/* ============================================================================
   MUTE + WIRING
   ========================================================================== */
function applyMute(){ muteBtn.classList.toggle("muted", muted); localStorage.setItem("ewg_muted", muted ? "1" : "0"); }
muteBtn.addEventListener("click", ()=>{ initAudio(); muted = !muted; applyMute(); if(!muted) sndKey(); });
startBtn.addEventListener("click", startGame);
againBtn.addEventListener("click", startGame);

document.addEventListener("keydown", (e)=>{
  if(phase !== "playing" || locked) return;
  if(e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key;
  if(k === "Enter"){ handleKey("ENTER"); }
  else if(k === "Backspace"){ handleKey("DEL"); }
  else if(/^[a-zA-Z]$/.test(k)){ handleKey(k.toUpperCase()); }
});

/* ── Boot ───────────────────────────────────────────── */
renderBrandMark();
buildBackground();
buildBoard();
buildKeyboard();
applyMute();
updateBestLines();
</script>
